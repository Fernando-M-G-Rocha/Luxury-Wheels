<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Reserva - {{ veiculo['modelo'] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function calcularTotal() {
            const inicio = document.getElementById("data_inicio").value;
            const fim = document.getElementById("data_fim").value;
            const precoDia = parseFloat({{ veiculo['valor_diaria'] }});

            if (inicio && fim) {
                const dtInicio = new Date(inicio + "T00:00:00");
                const dtFim = new Date(fim + "T00:00:00");

                const diffTime = dtFim - dtInicio;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                const totalElem = document.getElementById("valor_total");
                if (diffDays > 0) {
                    totalElem.innerText = "Total: " + (diffDays * precoDia).toFixed(2) + " €";
                } else {
                    totalElem.innerText = "Datas inválidas.";
                }
            }
        }
    </script>
</head>
<body>
<div class="container mt-5">
    <h2>Reservar {{ veiculo['marca'] }} {{ veiculo['modelo'] }}</h2>

    <form method="POST">
        <div class="mb-3">
            <label for="data_inicio" class="form-label">Data de Início</label>
            <input type="date" class="form-control" name="data_inicio" id="data_inicio" required oninput="calcularTotal()">
        </div>

        <div class="mb-3">
            <label for="data_fim" class="form-label">Data de Fim</label>
            <input type="date" class="form-control" name="data_fim" id="data_fim" required oninput="calcularTotal()">
        </div>

        <div class="mb-3">
            <strong id="valor_total">Total: -</strong>
        </div>

        <div class="mb-3">
            <label for="forma_pagamento_id" class="form-label">Método de Pagamento</label>
            <select class="form-select" name="forma_pagamento_id" id="forma_pagamento_id" required>
                <option value="">Escolher...</option>
                {% for forma in formas_pagamento %}
                    <option value="{{ forma['id'] }}">{{ forma['descricao'] }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Confirmar Reserva</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
